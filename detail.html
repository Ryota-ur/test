<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一覧</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="over-lay"></div>
    <div class="list__container">
        <aside class="list__sideBlock">
            <h1 class="list__logo">LOGO</h1>
            <nav class="list__sideNav">
                <ul class="list__sideMenu">
                    <a href="#" class="list__sideMenu--link">
                        <span><i class="fa-regular fa-file-lines" style="color: #4fc0ec;"></i></span>
                        <li class="list__sideMenu--text">テキスト</li>
                    </a>
                    <a href="#" class="list__sideMenu--link">
                        <span><i class="fa-regular fa-file-lines" style="color: #4fc0ec;"></i></span>
                        <li class="list__sideMenu--text">テキスト</li>
                    </a>
                    <a href="#" class="list__sideMenu--link">
                        <span><i class="fa-regular fa-file-lines" style="color: #4fc0ec;"></i></span>
                        <li class="list__sideMenu--text">テキスト</li>
                    </a>
                </ul>
            </nav>
        </aside>
        <main class="main__body">
            <header class="header">
                <button class="drawer-btn">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <nav class="header__nav">
                    <ul class="header__menu">
                        <li class="header__menu-item">
                            <a href="#" class="header__menu--links">
                                <p class="header__menu--text">テキスト</p>
                            </a>
                        </li>
                    </ul>
                </nav>
                <button class="header__logout" onclick="location.href='./index.html'">
                    <span><i class="fa-solid fa-arrow-right-from-bracket fa-xs" style="color: #ffffff;"></i></span>
                    <p class="header__logout--text">ログアウト</p>
                </button>
            </header>

            <section class="register">
                <div class="register__inner">
                    <form class="register__form">
                        <div class="search__input--box register-input">
                            <p class="search__input--text">管理会社</p>
                            <input type="text">
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">支店名</p>
                            <input type="text">
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">物件ID</p>
                            <input type="text">
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">物件管理番号</p>
                            <input type="text">
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">特定番号</p>
                            <input type="text">
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text required">建物名</p>
                            <input type="text" required>
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">建物カナ</p>
                            <input type="text">
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">部屋番号</p>
                            <input type="text">
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">供給地点番号（22桁）</p>
                            <input type="text">
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text required">郵便番号</p>
                            <input type="text" required>
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text required">住所</p>
                            <input type="text" required>
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text required">建物区分</p>
                            <select name="" id="search__input--select" required>
                                <option value=""></option>
                                <option value="">集合住宅</option>
                                <option value="">戸建</option>
                            </select>
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">ガス区分</p>
                            <select name="" id="search__input--select">
                                <option value=""></option>
                                <option value="">プロパンガス</option>
                                <option value="">都市ガス</option>
                            </select>
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">設備区分</p>
                            <select name="" id="search__input--select">
                                <option value=""></option>
                                <option value="">設備有</option>
                                <option value="">設備無</option>
                            </select>
                        </div>
                        <div class="search__input--box register-input">
                            <p class="search__input--text">ステータス</p>
                            <select name="" id="search__input--select">
                                <option value=""></option>
                                <option value="">契約中</option>
                                <option value="">解約中</option>
                            </select>
                        </div> 
                        <div class="search__input--box register-input">
                            <p class="search__input--text">備考</p>
                            <input type="text">
                        </div>
                    </form>
                    <div class="search__btn--wrap">
                        <button class="search__btn register__btn-typeA" type="submit" onclick="location.href='./list.html'">戻　る</button>
                        <button class="search__btn register__btn-typeB" type="submit" onclick="location.href='./list.html'">保　存</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    


<script src="./js/script.js"></script>
</body>
</html>
